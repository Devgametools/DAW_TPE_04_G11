{% extends 'base.html' %}
{% block contenido %}

<div class="container mt-5 text-center">
  <h1>Registrar nuevo curso</h1>
</div>
<div class="container mt-5 p-5">
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-group">
      <label for="nombre">Nombre del curso:</label>
      <input
        type="text"
        class="form-control"
        id="nombre"
        name="nombre"
        required
      />
    </div>
    <div class="form-group">
      <label for="creditos">Créditos:</label>
      <input
        type="number"
        class="form-control"
        id="creditos"
        name="creditos"
        required
      />
    </div>
    <div class="form-group">
      <label for="nivel">Nivel:</label>
      <select class="form-control" id="nivel" name="nivel">
        <option value="1">Nivel 1</option>
        <option value="2">Nivel 2</option>
        <option value="3">Nivel 3</option>
        <option value="4">Nivel 4</option>
        <option value="5">Nivel 5</option>
        <option value="6">Nivel 6</option>
        <option value="7">Nivel 7</option>
        <option value="8">Nivel 8</option>
        <option value="9">Nivel 9</option>
        <option value="10">Nivel 10</option>
      </select>
    </div>
    <div class="form-group">
      <label for="horas">Horas semanales:</label>
      <input
        type="number"
        class="form-control"
        id="horas"
        name="horas"
        required
      />
    </div>
    <div class="form-group">
      <label for="jornada">Jornada:</label>
      <select class="form-control" id="jornada" name="jornada">
        <option value="matutina">Matutina</option>
        <option value="vespertina">Vespertina</option>
        <option value="nocturna">Nocturna</option>
      </select>
    </div>
    <div class="form-group">
      <label for="imagen">Imagen:</label>
      <input
        type="file"
        class="form-control-file"
        id="imagen"
        name="imagen"
      />
    </div>
    <div class="form-group">
      <label for="docente">Docente:</label>
      <select class="form-control" id="docente" name="docente">
        {% for docente in form.fields.docente.queryset %}
        <option
          value="{{ docente.id }}"
          {% if form.docente.value == docente.id|stringformat:"s" %}selected{% endif %}
        >
          {{ docente.nombre }} {{ docente.apellido }}
        </option>
        {% endfor %}
      </select>
      {{ form.docente.errors }}
    </div>
    <button type="submit" class="btn btn-success">Registrar</button>
    <a href="{% url 'materias:listar' %}" class="btn btn-danger">Cancelar</a>
  </form>
</div>

{% endblock %}
