<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <div class="container mt-5 text-center">
      <h1>Cursos</h1>
    </div>
    <div class="container mt-5 p-5">
      {% for curso in cursos%}
      <div class="card" style="width: 400px">
        <img class="card-img-top" src="{{curso.imagen.url}}" alt="Card image" />
        <div class="card-body">
          <h4 class="card-title">{{curso.nombre}}</h4>
          <p class="card-text"><strong>Nivel:</strong> {{curso.nivel}}</p>
          <p class="card-text">
            <strong>Docente:</strong> {{curso.docente.nombre}}
            {{curso.docente.apellido}}
          </p>
          <a href="#" class="btn btn-primary">Ver detalles</a>
        </div>
      </div>
      {% endfor%}
    </div>
  </body>
</html>
