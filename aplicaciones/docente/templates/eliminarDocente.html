{% extends 'base.html' %} {% block contenido %}
<div
  class="modal fade"
  id="confirmarEliminarDocente"
  tabindex="-1"
  role="dialog"
  aria-labelledby="confirmarEliminarDocenteLabel"
  aria-hidden="true"
>
  <div
    class="modal-dialog modal-dialog-centered docente-delete-modal"
    role="document"
  >
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="confirmarEliminarDocenteLabel">
          Confirmar eliminación
        </h5>
      </div>
      <div class="modal-body">
        <p class="mb-0">
          ¿Seguro que deseas eliminar al docente
          <strong>{{ docente.nombre }} {{ docente.apellido }}</strong>?
        </p>
      </div>
      <div class="modal-footer">
        <a href="{% url 'docentes:listar' %}" class="btn btn-secondary"
          >Cancelar</a
        >
        <form method="post" class="m-0">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Eliminar</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  $(function () {
    $("#confirmarEliminarDocente").modal({
      backdrop: "static",
      keyboard: false,
      show: true,
    });

    $("#confirmarEliminarDocente").on("hidden.bs.modal", function () {
      window.location.href = "{% url 'docentes:listar' %}";
    });
  });
</script>
{% endblock %}
